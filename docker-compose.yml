services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: minipay
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minipay"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    ports:
      - "8081:8081"
    env_file: .env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/minipay_auth
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      REDIS_HOST: redis
      AUTH_SERVICE_URL: http://auth-service:8081
      WALLET_SERVICE_URL: http://wallet-service:8082
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
