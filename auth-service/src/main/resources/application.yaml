server:
  port: 8081

spring:
  application:
    name: auth-service
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  datasource:
    url: jdbc:postgresql://localhost:5432/minipay_auth
    username: minipay
    password: secret
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: ${JWT_SECRET:change-this-in-production-must-be-at-least-256-bits-long}
  access-token-expiry-ms: 900000
  refresh-token-expiry-ms: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized